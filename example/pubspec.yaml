name: escape_game_kit_example
description: A small demo of EscapeGameKit.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  escape_game_kit:
    path: ../
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  pretty_qr_code: ^3.6.0
  url_launcher: ^6.3.2
  window_manager: ^0.5.1
  just_audio: ^0.10.5
  just_audio_windows: ^0.2.3
  flutter_svg: ^2.3.0
  flutter_widget_from_html_core: ^0.17.2
  animate_do: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: SourceCodePro
      fonts:
        - asset: assets/fonts/SourceCodePro-Regular.ttf
  assets:
    - assets/
    - assets/backgrounds/
    - assets/fonts/
    - assets/glitch/
    - assets/interactables/
    - assets/objects/
    - assets/padlocks/
